# /etc/nginx/sites-available/analytics.conf
#
# Replace ANALYTICS_DOMAIN with your real subdomain (e.g. analytics.example.com).
# Deployment steps:
#   1. sed 's/ANALYTICS_DOMAIN/your.domain.com/g' analytics.conf \
#        | sudo tee /etc/nginx/sites-available/analytics.conf
#   2. sudo ln -sf /etc/nginx/sites-available/analytics.conf /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. sudo certbot --nginx -d your.domain.com
#      (certbot rewrites this file to add the SSL server block automatically.)

server {
    listen 80;
    listen [::]:80;
    server_name ANALYTICS_DOMAIN;

    # ACME challenge passthrough for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Body size: analyses send the full dataset as JSON. 50M handles ~200k rows.
    client_max_body_size 50m;

    # Long-running analyses (SEM, bootstrap) can take minutes.
    proxy_connect_timeout 10s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Health check
    location /healthz {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}

# After running certbot, it will append an HTTPS server block here with:
#   listen 443 ssl;
#   http2 on;
#   ssl_certificate / ssl_certificate_key
#   include /etc/letsencrypt/options-ssl-nginx.conf
#   ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem
# and rewrite the HTTP block to redirect to HTTPS.
