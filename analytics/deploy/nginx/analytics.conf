# /etc/nginx/sites-available/analytics.conf
#
# Replace ANALYTICS_DOMAIN with your real subdomain (e.g. analytics.example.com).
# Steps:
#   1. Save this file as /etc/nginx/sites-available/analytics.conf with the
#      ANALYTICS_DOMAIN placeholder replaced.
#   2. ln -s /etc/nginx/sites-available/analytics.conf /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#   4. certbot --nginx -d ANALYTICS_DOMAIN
#      (certbot rewrites this file to add the SSL block automatically.)

# HTTP -> HTTPS redirect. Certbot will fill in the SSL server block below.
server {
    listen 80;
    listen [::]:80;
    server_name ANALYTICS_DOMAIN;

    # ACME challenge handled by certbot; everything else redirects to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ANALYTICS_DOMAIN;

    # certbot will insert ssl_certificate / ssl_certificate_key lines here.

    # Reasonable defaults; certbot also writes options-ssl-nginx.conf.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Hardening
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    server_tokens off;

    # Body size: analyses send the full dataset as JSON. 50M handles ~200k rows.
    client_max_body_size 50m;

    # Long-running analyses (SEM, bootstrap) can take minutes.
    proxy_connect_timeout 10s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Health check is open. /v1/* still requires X-Analytics-Key, applied by the app.
    location /healthz {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
